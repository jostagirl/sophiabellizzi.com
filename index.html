<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>This space is spoken for</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #f7f3f0, #e8e0dc);
      font-family: 'Cormorant Garamond', serif;
      color: #3a2f2f;
      text-align: center;
    }

    .container {
      max-width: 600px;
      padding: 40px;
    }

    h1 {
      font-weight: 400;
      font-size: 2.2rem;
      margin-bottom: 20px;
      letter-spacing: 0.05em;
    }

    p {
      font-size: 1.1rem;
      line-height: 1.6;
      margin: 10px 0;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: #a38f85;
      margin: 25px auto;
    }

    .footer {
      margin-top: 30px;
      font-size: 0.9rem;
      opacity: 0.7;
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>This domain is spoken for.</h1>

    <div class="divider"></div>

    <p>A real person will be here someday.</p>
    <p>This page is quietly waiting for the right moment.</p>

    <div class="divider"></div>

    <div class="footer">Claimed in 2026</div>
  </div>
</body>
</html>
